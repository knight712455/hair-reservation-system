<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Hair Reservation System</title>

    <style>

        body {
            font-family: Arial;
            padding: 30px;
        }

        h1 {
            margin-bottom: 30px;
        }

        #timeSlots button {
            margin: 5px;
            padding: 10px 14px;
            cursor: pointer;
        }

        .selected {
            background-color: black;
            color: white;
        }

        table {
            margin-top: 30px;
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            padding: 10px;
            text-align: center;
        }

    </style>
</head>

<body>

<h1>예약 시스템</h1>

<!-- 디자이너 선택 -->
<div>

    <label>디자이너:</label>

    <select id="resourceId">
        <option value="1">디자이너1</option>
    </select>

</div>

<br>

<!-- 날짜 선택 -->
<div>

    <input type="date" id="datePicker">

    <button onclick="loadTimes()">
        시간 조회
    </button>

</div>

<br>

<!-- 시간 버튼 -->
<div id="timeSlots"></div>

<br>

<!-- 예약 버튼 -->
<button onclick="createReservation()">
    예약하기
</button>

<!-- 예약 목록 -->
<table border="1">

    <thead>

    <tr>
        <th>ID</th>
        <th>유저</th>
        <th>디자이너</th>
        <th>시작 시간</th>
        <th>종료 시간</th>
        <th>상태</th>
        <th>관리</th>
    </tr>

    </thead>

    <tbody id="tableBody"></tbody>

</table>

<script>

    let selectedTime = null;

    // 예약 목록 조회
    function loadReservations() {

        fetch('/reservations?page=0&size=10')

            .then(res => res.json())

            .then(data => {

                const tbody =
                    document.getElementById('tableBody');

                tbody.innerHTML = '';

                data.content.forEach(r => {

                    const row = `
                        <tr>
                            <td>${r.id}</td>
                            <td>${r.userName}</td>
                            <td>${r.resourceName}</td>
                            <td>${r.slotStart}</td>
                            <td>${r.slotEnd}</td>
                            <td>${r.status}</td>
                            <td>
                                <button
                                    onclick="cancelReservation(${r.id})"
                                >
                                    취소
                                </button>
                            </td>
                        </tr>
                    `;

                    tbody.innerHTML += row;
                });

            });
    }

    // 예약 생성
    async function createReservation() {

        const date =
            document.getElementById("datePicker").value;

        const resourceId =
            document.getElementById("resourceId").value;

        if (!date || !selectedTime) {

            alert("날짜와 시간을 선택하세요");

            return;
        }

        const hour =
            parseInt(selectedTime.split(":")[0]);

        const start =
            `${date}T${selectedTime}:00`;

        const end =
            `${date}T${String(hour + 1).padStart(2, "0")}:00:00`;

        console.log({
            userId: 1,
            resourceId,
            start,
            end
        });

        const res = await fetch("/reservations", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({

                userId: 1,
                resourceId: Number(resourceId),

                start,
                end
            })
        });

        if (!res.ok) {

            const err = await res.json();

            console.log(err);

            alert(
                err.message ||
                err.error ||
                "예약 실패"
            );

            return;
        }

        alert("예약 완료");

        selectedTime = null;

        loadTimes();
        loadReservations();
    }

    // 시간 조회
    async function loadTimes() {

        const date =
            document.getElementById("datePicker").value;

        const resourceId =
            document.getElementById("resourceId").value;

        if (!date) {

            alert("날짜를 선택하세요.");

            return;
        }

        const res = await fetch(
            `/timeslots?resourceId=${resourceId}&date=${date}`
        );

        const data = await res.json();

        const container =
            document.getElementById("timeSlots");

        container.innerHTML = "";

        data.forEach(slot => {

            const btn =
                document.createElement("button");

            btn.innerText = slot.time;

            if (!slot.available) {

                btn.disabled = true;

            } else {

                btn.onclick = () =>
                    selectTime(slot.time, btn);
            }

            container.appendChild(btn);
        });
    }

    // 시간 선택
    function selectTime(time, element) {

        selectedTime = time;

        document
            .querySelectorAll("#timeSlots button")
            .forEach(btn =>
                btn.classList.remove("selected")
            );

        element.classList.add("selected");
    }

    // 예약 취소
    async function cancelReservation(id) {

        const res = await fetch(
            `/reservations/${id}/cancel`,
            {
                method: "PATCH"
            }
        );

        const text = await res.text();

        alert(text);

        loadReservations();
        loadTimes();
    }

    // 페이지 최초 진입 시 실행
    loadReservations();

</script>

</body>

</html>
